<!-- 複数ファイル対応 Ace Editor コンポーネント -->
<div class="editor-wrapper" style="border: 1px solid var(--md-default-fg-color--lightest, #ccc); border-radius: 4px; overflow: hidden; background: var(--md-default-bg-color, #fff);">
    
    <!-- ヘッダー部分：タブとコントロール -->
    <div class="editor-header" style="display: flex; background: var(--md-code-bg-color, #f5f5f5); border-bottom: 1px solid var(--md-default-fg-color--lightest, #ccc); align-items: flex-end; padding-top: 5px;">
        <!-- タブが並ぶコンテナ -->
        <div id="tabs-container" style="display: flex; flex-wrap: wrap; flex-grow: 1; padding-left: 5px;">
            <!-- JSでタブが追加されます -->
        </div>
        
        <!-- コントロールボタン群 -->
        <div style="display: flex; padding: 0 10px 5px 10px; gap: 10px; align-items: center;">
            <button id="add-file-btn" style="cursor: pointer; padding: 2px 8px; border-radius: 4px; border: 1px solid #aaa; background: transparent;" title="新規ファイル追加">＋ ファイル追加</button>
            <select id="lang-select" style="padding: 2px 5px; border-radius: 4px; border: 1px solid #aaa; background: var(--md-default-bg-color, #fff); color: var(--md-default-fg-color, #333);">
                <option value="c_cpp">C++</option>
                <option value="rust">Rust</option>
            </select>
        </div>
    </div>

    <!-- エディタ本体 -->
    <div id="editor" style="width: 100%; height: 400px;"></div>
</div>

<!-- Ace Editor本体 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/ace.js"></script>

<!-- 提出ボタン (テスト用) -->
<button id="submit-code-btn" class="md-button md-button--primary">提出する :fontawesome-solid-paper-plane: </button>

<style>
    /* タブのスタイル定義 */
    .file-tab {
        padding: 6px 12px;
        margin-right: 4px;
        background: var(--md-default-bg-color, #e0e0e0);
        border: 1px solid var(--md-default-fg-color--lightest, #ccc);
        border-bottom: none;
        border-radius: 4px 4px 0 0;
        cursor: pointer;
        font-family: monospace;
        font-size: 14px;
        color: var(--md-default-fg-color, #555);
    }
    .file-tab.active {
        background: var(--md-default-bg-color, #fff);
        font-weight: bold;
        color: var(--md-typeset-color, #000);
        border-bottom: 2px solid var(--md-primary-fg-color, #007bff);
        margin-bottom: -1px; /* 下線をエディタ境界に重ねる */
    }
    .file-tab .delete-btn {
        margin-left: 8px;
        color: #ff4c4c;
        cursor: pointer;
        font-weight: bold;
    }
</style>

<script>
    // === エディタ初期化 ===
    const editor = ace.edit("editor");
    editor.setFontSize(16);

    // サイトテーマ同期 (Zensical対応)
    function syncTheme() {
        const scheme = document.body.getAttribute('data-md-color-scheme');
        editor.setTheme(scheme === 'slate' ? "ace/theme/monokai" : "ace/theme/github");
    }
    syncTheme();
    const observer = new MutationObserver((mutations) => {
        mutations.forEach((m) => { if (m.attributeName === 'data-md-color-scheme') syncTheme(); });
    }).observe(document.body, { attributes: true });

    // === 複数ファイル状態管理 ===
    let files = []; // { name: string, session: ace.EditSession } の配列
    let activeFileIndex = -1;

    // 言語ごとの初期モードと雛形
    const langConfig = {
        "c_cpp": { mode: "ace/mode/c_cpp", defaultExt: ".cpp" },
        "rust":  { mode: "ace/mode/rust",  defaultExt: ".rs" }
    };

    const tabsContainer = document.getElementById('tabs-container');
    const langSelect = document.getElementById('lang-select');

    // ファイル追加関数
    function addFile(filename, initialContent = "") {
        // 重複チェック
        if (files.some(f => f.name === filename)) {
            alert("同名のファイルが既に存在します。");
            return;
        }

        const mode = langConfig[langSelect.value].mode;
        
        // ★重要: Ace Editorの「セッション」をファイルごとに新規作成
        const session = new ace.EditSession(initialContent);
        session.setMode(mode);
        
        // やり直し(Undo)履歴の設定
        session.setUndoManager(new ace.UndoManager());

        files.push({ name: filename, session: session });
        switchToFile(files.length - 1);
        renderTabs();
    }

    // ファイル削除関数
    function deleteFile(index, event) {
        event.stopPropagation(); // タブ切り替えが発火するのを防ぐ
        if (files.length <= 1) {
            alert("最後のファイルは削除できません。");
            return;
        }
        if (confirm(`「${files[index].name}」を削除しますか？`)) {
            files.splice(index, 1);
            if (activeFileIndex >= files.length) {
                switchToFile(files.length - 1);
            } else if (activeFileIndex === index) {
                switchToFile(0);
            } else {
                renderTabs();
            }
        }
    }

    // タブ切り替え関数
    function switchToFile(index) {
        activeFileIndex = index;
        // ★重要: エディタの表示内容（セッション）をガチャンと切り替える
        editor.setSession(files[index].session);
        renderTabs();
    }

    // タブのUI再描画関数
    function renderTabs() {
        tabsContainer.innerHTML = '';
        files.forEach((file, index) => {
            const tab = document.createElement('div');
            tab.className = `file-tab ${index === activeFileIndex ? 'active' : ''}`;
            tab.innerHTML = `${file.name} <span class="delete-btn" title="削除">×</span>`;
            
            // タブクリックでファイル切り替え
            tab.addEventListener('click', () => switchToFile(index));
            
            // 削除ボタンイベント
            tab.querySelector('.delete-btn').addEventListener('click', (e) => deleteFile(index, e));
            
            tabsContainer.appendChild(tab);
        });
    }

    // === イベントリスナー登録 ===

    // 「＋ ファイル追加」ボタン
    document.getElementById('add-file-btn').addEventListener('click', () => {
        const ext = langConfig[langSelect.value].defaultExt;
        const filename = prompt(`新しいファイル名を入力してください\n(例: utils${ext}, Point.h)`, `new_file${ext}`);
        if (filename) {
            addFile(filename);
        }
    });

    // 言語変更時（現在開いている全ファイルのモードを変更）
    langSelect.addEventListener('change', () => {
        const mode = langConfig[langSelect.value].mode;
        files.forEach(f => f.session.setMode(mode));
    });

    // 初期ファイルの作成
    addFile("main.cpp", "#include <iostream>\n\nint main() {\n    std::cout << \"Hello!\" << std::endl;\n    return 0;\n}\n");

    // === 提出処理 ===
    const submitBtn = document.getElementById('submit-code-btn');
    if (submitBtn) {
        submitBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            
            // 提出用データの作成（全ファイルの名前と中身を配列にまとめる）
            const submissionData = files.map(file => ({
                filename: file.name,
                content: file.session.getValue()
            }));
            
            const payload = {
                language: langSelect.value,
                files: submissionData
            };

            console.log("=== ラズパイへ送信するJSONデータ ===");
            console.log(JSON.stringify(payload, null, 2));

            alert("提出データを作成しました！\nブラウザのデベロッパーツール(F12)の「Console」タブで送信されるJSONデータを確認してください。");
        });
    }
</script>
